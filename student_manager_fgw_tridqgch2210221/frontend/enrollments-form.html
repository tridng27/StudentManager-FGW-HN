<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Form - Student Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="enrollments-form">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>📚 Student Manager</h1>
            </div>
            <button class="menu-toggle">☰</button>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="students.html">Students</a>
                <a href="courses.html">Courses</a>
                <a href="enrollments.html" class="active">Enrollments</a>
                <a href="grades.html">Grades</a>
                <a href="about.html">About</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div class="page-header">
            <a href="enrollments.html" class="btn btn-secondary">← Back to Enrollments</a>
            <h2>New Enrollment</h2>
        </div>

        <!-- Form Card -->
        <div class="card form-card">
            <form id="enrollmentForm" data-page="enrollments-form">
                <div class="form-group">
                    <label for="student">Select Student <span class="required">*</span></label>
                    <select id="student" name="student" class="form-control" required>
                        <option value="">Loading students...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="course">Select Course <span class="required">*</span></label>
                    <select id="course" name="course" class="form-control" required>
                        <option value="">Loading courses...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="enrollmentDate">Enrollment Date <span class="required">*</span></label>
                    <input type="date" id="enrollmentDate" name="enrollmentDate" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="status">Status <span class="required">*</span></label>
                    <select id="status" name="status" class="form-control" required>
                        <option value="">Select Status</option>
                        <option value="enrolled" selected>Enrolled</option>
                        <option value="dropped">Dropped</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Create Enrollment</button>
                    <a href="enrollments.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Student Manager</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
