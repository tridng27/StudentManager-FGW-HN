<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Form - Student Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="grades-form">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>📚 Student Manager</h1>
            </div>
            <button class="menu-toggle">☰</button>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="students.html">Students</a>
                <a href="courses.html">Courses</a>
                <a href="enrollments.html">Enrollments</a>
                <a href="grades.html" class="active">Grades</a>
                <a href="about.html">About</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div class="page-header">
            <a href="grades.html" class="btn btn-secondary">← Back to Grades</a>
            <h2>Record Grade</h2>
        </div>

        <!-- Form Card -->
        <div class="card form-card">
            <form id="gradeForm" data-page="grades-form">
                <div class="form-group">
                    <label for="student">Select Student <span class="required">*</span></label>
                    <select id="student" name="student" class="form-control" required>
                        <option value="">Loading students...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="course">Select Course <span class="required">*</span></label>
                    <select id="course" name="course" class="form-control" required>
                        <option value="">Loading courses...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="score">Score (0-100) <span class="required">*</span></label>
                    <input type="number" id="score" name="score" class="form-control" min="0" max="100" required>
                    <small>Letter grade will be calculated automatically</small>
                </div>

                <div class="form-group">
                    <label for="dateRecorded">Date Recorded <span class="required">*</span></label>
                    <input type="date" id="dateRecorded" name="dateRecorded" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" name="notes" class="form-control" rows="4" placeholder="Add any additional notes..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Record Grade</button>
                    <a href="grades.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>

        <!-- Grade Scale Reference -->
        <div class="card">
            <h4>Grade Scale Reference</h4>
            <table class="table">
                <tr>
                    <th>Grade</th>
                    <th>Score Range</th>
                </tr>
                <tr>
                    <td><strong>A</strong></td>
                    <td>90 - 100</td>
                </tr>
                <tr>
                    <td><strong>B</strong></td>
                    <td>80 - 89</td>
                </tr>
                <tr>
                    <td><strong>C</strong></td>
                    <td>70 - 79</td>
                </tr>
                <tr>
                    <td><strong>D</strong></td>
                    <td>60 - 69</td>
                </tr>
                <tr>
                    <td><strong>F</strong></td>
                    <td>Below 60</td>
                </tr>
            </table>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Student Manager</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
