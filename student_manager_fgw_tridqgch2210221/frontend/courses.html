<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Student Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="courses">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>📚 Student Manager</h1>
            </div>
            <button class="menu-toggle">☰</button>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="students.html">Students</a>
                <a href="courses.html" class="active">Courses</a>
                <a href="enrollments.html">Enrollments</a>
                <a href="grades.html">Grades</a>
                <a href="about.html">About</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div class="page-header">
            <h2>Courses</h2>
            <a href="courses-form.html" class="btn btn-primary">+ New Course</a>
        </div>

        <!-- Search/Filter Section -->
        <div class="card search-card">
            <div class="form-group">
                <label for="search">Search Courses:</label>
                <input type="text" id="search" placeholder="Search by title or code..." class="form-control">
            </div>
            <div class="form-group">
                <label for="semester-filter">Semester:</label>
                <select id="semester-filter" class="form-control">
                    <option value="">All Semesters</option>
                    <option value="Fall 2024">Fall 2024</option>
                    <option value="Spring 2025">Spring 2025</option>
                    <option value="Summer 2025">Summer 2025</option>
                </select>
            </div>
        </div>

        <!-- Courses Table -->
        <div class="card table-card">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Title</th>
                        <th>Credits</th>
                        <th>Instructor</th>
                        <th>Capacity</th>
                        <th>Semester</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 20px;">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Student Manager</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
